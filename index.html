<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css?v=5" />
  <title>The Empty Book</title>
  <style>
    #main-content { visibility: hidden; opacity: 0; }
  </style>
</head>

<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div id="login-box">
      <h2>Isay ika?</h2>
      <p>Enter ur Neym</p>
      <input type="text" id="name-input" placeholder="Your name..." autocomplete="off" />
      <button id="enter-btn">Enter</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content" class="hidden-main">
    <div id="gradient-bg"></div>
    <div id="particles-default"></div>
    <div id="tsparticles"></div>
    <div id="spotlight"></div>

    <div class="book-wrapper">
      <div class="flipbook">

        <!-- Book Front Cover -->
        <div class="hard">
          <div class="cover-title">
            <span class="cover-main-title">Empty Book</span>
            <div class="cover-divider"></div>
            <span class="cover-subtitle">~ by Nobody</span>
          </div>
        </div>
        <div class="hard"></div>

        <!-- Book Inner Pages -->
        <div class="page"><span class="page-num right">1</span></div>
        <div class="page"><span class="page-num left">2</span></div>
        <div class="page"><span class="page-num right">3</span></div>
        <div class="page"><span class="page-num left">4</span></div>
        <div class="page"><span class="page-num right">5</span></div>
        <div class="page" id="image-page">
          <div class="taped-photo">
            <img src="images/1stTogetherPic1.jpeg" alt="Our First Photo" />
          </div>
          <small>Keep Smiling</small>
          <span class="page-num left">6</span>
        </div>
        <div class="page" id="notes-page">
          <div class="notes-container" id="notes-container"></div>
          <span class="page-num right">7</span>
        </div>
        <div class="page"><span class="page-num left">8</span></div>

        <!-- Book Back Cover -->
        <div class="hard"></div>
        <div class="hard"><span class="back-thank-you">Thank You</span></div>

      </div>
    </div>

  </div> <!-- end main-content -->

  <!-- Music bar — shown on mobile/tablet when image page is visible -->
  <div id="music-bar">
    <button id="music-play-btn" onclick="window.triggerMusic()">&#9654; Secret Button</button>
  </div>

  <!-- Now playing bar — shown when music starts -->
  <div id="now-playing">
    <div id="np-art">♫</div>
    <div id="np-marquee-wrap">
      <div id="np-marquee">
        <span id="np-title"></span>
        <span id="np-title-clone"></span>
      </div>
    </div>
  </div>

  <script src="jquery.js"></script>
  <script src="turn.js"></script>
  <script src="particles.min.js"></script>
  <script src="mainJS.js?v=6"></script>

</body>
</html>
