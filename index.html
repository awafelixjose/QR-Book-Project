<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>The Empty Book</title>
  <style>
    #main-content { display: none !important; }
    #login-screen { display: flex; }
  </style>
</head>

<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div id="login-box">
      <h2>Isay ika?</h2>
      <p>Enter ur Neym</p>
      <input type="text" id="name-input" placeholder="Your name..." autocomplete="off" />
      <button id="enter-btn">Enter</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content" class="hidden-main">
    <div id="gradient-bg"></div>
    <div id="particles-default"></div>
    <div id="tsparticles"></div>
  

  <div class="book-wrapper">
    <div class="flipbook">

      <!-- Front cover -->
      <div class="hard">
          <div class="cover-title">
              <span class="cover-main-title">Empty Book</span>
              <div class="cover-divider"></div>
              <span class="cover-subtitle">~ by Nobody</span>
          </div>
      </div>
      <div class="hard"></div>
      

      <!-- Inner pages -->
      <div class="page"><span class="page-num right">1</span></div>
      <div class="page"><span class="page-num left">2</span></div>
      <div class="page"><span class="page-num right">3</span></div>
      <div class="page"><span class="page-num left">4</span></div>
      <div class="page"><span class="page-num right">5</span></div>
      <div class="page" id="image-page">
          <div class="taped-photo">
              <img src="images/1stTogetherPic1.jpeg" alt="Our First Photo" />
          </div>
          <small>Keep Smiling</small>
          <span class="page-num left">6</span>
      </div>
      <div class="page" id="notes-page">
          <div class="notes-container" id="notes-container"></div>
          <span class="page-num right">7</span>
      </div>
      <div class="page"><span class="page-num left">8</span></div>

      <!-- Back cover -->
      <div class="hard"></div>
      <div class="hard">Thank You</div>

    </div>

  </div>

     

  </div> <!-- end main-content -->

  <!-- Music player UI — shown below book on mobile when on image page -->
  <div id="music-bar">
    <button id="music-play-btn" onclick="window.triggerMusic()">&#9654; Tap Here</button>
  </div>

  <script src="jquery.js"></script>
  <script src="turn.js"></script>
  <script src="particles.min.js"></script>
  <script src="mainJS.js"></script>
  <script id="c07xnp">
    const audioFiles = [
      "audio_list/track1.mp3",
      "audio_list/track2.mp3",
      "audio_list/track3.mp3",
      "audio_list/track4.mp3",
      "audio_list/track5.mp3",
      "audio_list/track6.mp3",
      "audio_list/track7.mp3",
      "audio_list/track8.mp3",
      "audio_list/track9.mp3"
    ];

    const audio = new Audio();
    let musicLocked = false;
    let hasPlayed = false;

    window.triggerMusic = function() {
      if (hasPlayed) return;
      hasPlayed = true;
      musicLocked = true;
      const track = audioFiles[Math.floor(Math.random() * audioFiles.length)];
      audio.src = track;
      audio.volume = 1;
      audio.play().catch(function(e) { console.warn("play failed:", e); });
      document.getElementById("gradient-bg").classList.add("active");
      document.getElementById("tsparticles").classList.add("active");
      document.getElementById("particles-default").classList.add("hidden");
      document.getElementById("music-bar").style.display = "none";
      noteEl.style.opacity = "1";
      audio.onended = function() { musicLocked = false; };
    };

    // Gate logic
    (function() {
      var _x = [107,117,114,100,97,112,121,97];
      function _chk(s) {
        if (s.length !== _x.length) return false;
        for (var i = 0; i < s.length; i++) {
          if (s.charCodeAt(i) !== _x[i]) return false;
        }
        return true;
      }
      function _unlock() {
        var ls = document.getElementById("login-screen");
        var mc = document.getElementById("main-content");
        ls.style.transition = "opacity 0.8s ease";
        ls.style.opacity = "0";
        setTimeout(function() {
          ls.style.display = "none";
          mc.classList.remove("hidden-main");
          mc.style.display = "grid";
          mc.style.opacity = "0";
          mc.style.transition = "opacity 0.8s ease";
          setTimeout(function() { mc.style.opacity = "1"; }, 50);
        }, 800);
      }
      function _fail() {
        var err = document.getElementById("login-error");
        err.textContent = "That\u2019s not right. Try again.";
        var inp = document.getElementById("name-input");
        inp.classList.add("shake");
        setTimeout(function() { inp.classList.remove("shake"); }, 500);
      }
      window._gate = function() {
        var v = document.getElementById("name-input").value.trim().toLowerCase();
        if (_chk(v)) { _unlock(); } else { _fail(); }
      };
    })();

    document.getElementById("enter-btn").addEventListener("click", function() { window._gate(); });
    document.getElementById("name-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") window._gate();
    });

    // Random notes
    const allNotes = [
      "sungit baga ISUS ISUS",
      "ah ah ah",
      "Salamat na very cold, grrrr....",
      "Ya wowers haha",
      "Hiii",
      "Iniwi, Goood luck and ulways wish U the best of outcome!",
      "Diri ika malingaw na mag smile",
      "Ya WOW haha",
      "Thank you?",
      "photo bomber si Voight"
    ];
    const picked = allNotes[Math.floor(Math.random() * allNotes.length)];
    const noteContainer = document.getElementById("notes-container");
    const noteEl = document.createElement("p");
    noteEl.className = "note-item";
    noteEl.textContent = "\u201C" + picked + "\u201D";
    noteEl.style.opacity = "0";
    noteEl.style.transition = "opacity 1.2s ease";
    noteContainer.appendChild(noteEl);

    function isImagePageVisible() {
      const el = document.getElementById("image-page");
      if (!el) return false;
      const rect = el.getBoundingClientRect();
      const bookRect = document.querySelector(".flipbook").getBoundingClientRect();
      return rect.width > 50 && rect.left >= bookRect.left && rect.right <= bookRect.right + 5;
    }

    function getBookSize() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      if (vw >= 1600) return { width: 1120, height: 700 };
      if (vw >= 1024) return { width: 800, height: 500 };
      if (vw >= 768)  return { width: 600, height: 375 };
      // Mobile: use almost full screen width, leave 60px for music bar
      const maxW = vw - 8;
      const maxH = vh - 70;
      const h = Math.round(maxW * 5 / 8);
      if (h <= maxH) return { width: maxW, height: h };
      return { width: Math.round(maxH * 8 / 5), height: maxH };
    }

    const bookSize = getBookSize();

    $(".flipbook").turn({
      width: bookSize.width,
      height: bookSize.height,
      gradients: true,
      acceleration: true,
      when: {
        turning: function(e) {
          if (musicLocked) e.preventDefault();
        },
        turned: function(e, page) {
          const visible = isImagePageVisible();
          if (visible && !hasPlayed) {
            // Desktop: auto-play. Mobile: show the music bar below the book
            if (window.innerWidth >= 1024) {
              hasPlayed = true;
              musicLocked = true;
              const track = audioFiles[Math.floor(Math.random() * audioFiles.length)];
              audio.src = track;
              audio.volume = 1;
              audio.play().catch(function(e) { console.warn("play failed:", e); });
              document.getElementById("gradient-bg").classList.add("active");
              document.getElementById("tsparticles").classList.add("active");
              document.getElementById("particles-default").classList.add("hidden");
              noteEl.style.opacity = "1";
              audio.onended = function() { musicLocked = false; };
            } else {
              document.getElementById("music-bar").style.display = "flex";
            }
          } else if (!visible) {
            document.getElementById("music-bar").style.display = "none";
            noteEl.style.opacity = "0";
            audio.pause();
            audio.currentTime = 0;
            musicLocked = false;
            document.getElementById("gradient-bg").classList.remove("active");
            document.getElementById("tsparticles").classList.remove("active");
            document.getElementById("particles-default").classList.remove("hidden");
          }
        }
      }
    });
  </script>
</body>
